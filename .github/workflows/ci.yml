name: CI

on:
  push:
    branches: [main, master, copilot/**]
  pull_request:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - uses: actions/cache@v4
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-julia-artifacts-${{ hashFiles('**/Project.toml') }}
      - name: Install dependencies
        run: |
          python3 -m pip install --user pybtex
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run tests
        run: JULIA_PYTHONCALL_EXE=python3 julia --project=. -e 'using Pkg; Pkg.test()'
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ["1.10", "1"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Install Python pybtex
        run: |
          pip install pybtex

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop(PackageSpec(url="https://github.com/rafaelab/pybtex.jl"))
            Pkg.instantiate()
          '

      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: 2

      - uses: julia-actions/julia-processcoverage@v1

      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
