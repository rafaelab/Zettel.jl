name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ["1.10"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - name: Install Python pybtex
        run: |
          pip install pybtex

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop(PackageSpec(; url = "https://github.com/rafaelab/pybtex.jl"))
            Pkg.instantiate()
          '

      - uses: julia-actions/julia-runtest@v1
        env:
          JULIA_NUM_THREADS: 2

      - uses: julia-actions/julia-processcoverage@v1
