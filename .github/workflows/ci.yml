name: CI

on:
  push:
    branches: [main, master, copilot/**]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} – ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ["1.10"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9

      - name: Install Python pybtex
        run: |
          pip install pybtex

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.develop(PackageSpec(url="https://github.com/rafaelab/pybtex.jl"))
            Pkg.instantiate()
          '

      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3
        env:
          JULIA_NUM_THREADS: 2

      - uses: julia-actions/julia-processcoverage@03114f09f119417c3242a9fb6e0b722676aedf38

      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
