name: Docs

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71
        with:
          version: "1"

      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9

      - name: Install Python pybtex
        run: pip install pybtex

      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(url="https://github.com/rafaelab/pybtex.jl"))
            Pkg.develop(PackageSpec(path=".."))
            Pkg.instantiate()
          '

      - name: Build and deploy docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
